<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="5; url=https://brew-planner-saas.website.yandexcloud.net/">
  <link rel="canonical" href="https://brew-planner-saas.website.yandexcloud.net/">
  <title>Brew Planner переехал</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #64748b;
      --line: #cbd5e1;
      --brand: #ff8b00;
      --brand-dark: #c45f00;
      --soft: #fff7ed;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 22% 12%, rgba(255, 139, 0, .16), transparent 28%),
        linear-gradient(145deg, #f8fafc 0%, #eef2f7 48%, #e2e8f0 100%);
      color: var(--ink);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(560px, 100%);
      display: grid;
      gap: 18px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 22px 70px rgba(15, 23, 42, .12);
    }

    .badge {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 650;
      line-height: 1.5;
    }

    a {
      color: inherit;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 4px;
    }

    .primary {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: var(--brand);
      color: #ffffff;
      font-size: 15px;
      font-weight: 900;
      text-decoration: none;
    }

    .primary svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <span class="badge">Контур закрыт</span>
    <h1>Brew Planner переехал в SaaS-контур</h1>
    <p>
      Одиночный Yandex-контур больше не используется. Сейчас вы будете
      автоматически перенаправлены в актуальный SaaS-сервис.
    </p>
    <div class="actions">
      <a class="primary" id="redirectLink" href="https://brew-planner-saas.website.yandexcloud.net/">
        Перейти сейчас
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg>
      </a>
    </div>
    <small>Если переход не начался автоматически, нажмите кнопку выше.</small>
  </main>
  <script>
    (function () {
      var target = new URL("https://brew-planner-saas.website.yandexcloud.net/");
      target.search = window.location.search;
      target.hash = window.location.hash;
      var link = document.getElementById("redirectLink");
      if (link) link.href = target.href;
      window.setTimeout(function () {
        window.location.replace(target.href);
      }, 3500);
    }());
  </script>
</body>
</html>
