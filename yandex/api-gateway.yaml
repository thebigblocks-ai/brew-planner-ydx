openapi: 3.0.0
info:
  title: Brew Planner API
  version: 0.1.0

x-yc-apigateway:
  service_account_id: <SERVICE_ACCOUNT_ID>

paths:
  /{proxy+}:
    options:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        service_account_id: <SERVICE_ACCOUNT_ID>
        payload_format_version: "1.0"
      responses:
        "204":
          description: CORS preflight
    get:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        service_account_id: <SERVICE_ACCOUNT_ID>
        payload_format_version: "1.0"
      responses:
        "200":
          description: OK
    post:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        service_account_id: <SERVICE_ACCOUNT_ID>
        payload_format_version: "1.0"
      responses:
        "200":
          description: OK
    put:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        service_account_id: <SERVICE_ACCOUNT_ID>
        payload_format_version: "1.0"
      responses:
        "200":
          description: OK
    patch:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        service_account_id: <SERVICE_ACCOUNT_ID>
        payload_format_version: "1.0"
      responses:
        "200":
          description: OK
    delete:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        service_account_id: <SERVICE_ACCOUNT_ID>
        payload_format_version: "1.0"
      responses:
        "200":
          description: OK

  /health:
    get:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        service_account_id: <SERVICE_ACCOUNT_ID>
        payload_format_version: "1.0"
      responses:
        "200":
          description: OK
